<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Optik Tarama</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <meta name="color-scheme" content="light">
    <script src="theme-manager.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <script src="https://docs.opencv.org/4.5.2/opencv.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#7C3AED",
                        secondary: "#F3F4F6",
                        surface: "#FFFFFF",
                        "text-main": "#111827",
                        "text-muted": "#6B7280",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .scanner-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0;
        }

        .scanner-frame::before {
            content: '';
            position: absolute;
            top: 12%;
            left: 4%;
            right: 4%;
            bottom: 15%;
            border: 4px solid #7C3AED;
            border-radius: 20px;
            opacity: 0.6;
            clip-path: polygon(0 0, 25% 0, 25% 4px, 4px 4px, 4px 25%, 0 25%, 0 0, 75% 0, 100% 0, 100% 25%, calc(100% - 4px) 25%, calc(100% - 4px) 4px, 75% 4px, 75% 0, 100% 75%, 100% 100%, 75% 100%, 75% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 75%, 100% 75%, 25% 100%, 0 100%, 0 75%, 4px 75%, 4px calc(100% - 4px), 25% calc(100% - 4px), 25% 100%);
        }

        .scan-line {
            position: absolute;
            top: 12%;
            left: 4%;
            right: 4%;
            height: 4px;
            background: linear-gradient(180deg, transparent, rgba(124, 58, 237, 0.8), transparent);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
            animation: scan 3s ease-in-out infinite;
            z-index: 15;
        }

        @keyframes scan {
            0% {
                top: 13%;
            }

            50% {
                top: 84%;
            }

            100% {
                top: 13%;
            }
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #111;
        }

        .capture-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: #fff;
            padding: 4px;
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .capture-btn-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #fff;
            border: 2px solid #000;
        }
    </style>
</head>

<body class="font-sans">
    <div class="max-w-md mx-auto h-full relative flex flex-col overflow-hidden">
        <!-- Top Controls -->
        <header class="absolute top-0 w-full px-6 pt-12 flex justify-between items-center z-20">
            <button onclick="window.history.back(); setTimeout(() => window.location.href='dashboard.html', 100);"
                class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div class="px-4 py-2 rounded-full bg-black/40 backdrop-blur-md text-[10px] font-bold tracking-[0.1em] text-white uppercase border border-white/10"
                id="examTypeLabel">
                LGS DENEME
            </div>
            <button id="settingsToggle" onclick="toggleSettings()"
                class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white">
                <span class="material-symbols-outlined">settings</span>
            </button>
            <button
                class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white">
                <span class="material-symbols-outlined">flash_on</span>
            </button>
        </header>

        <!-- Camera Feed -->
        <video id="camera-feed" autoplay playsinline muted
            class="absolute inset-0 w-full h-full object-cover z-0"></video>
        <div id="camera-placeholder"
            class="absolute inset-0 flex flex-col items-center justify-center bg-[#111] z-0 transition-opacity duration-500 p-8 text-center">
            <span class="material-symbols-outlined text-white/20 text-[120px] mb-4"
                id="placeholder-icon">photo_camera</span>
            <div id="camera-status" class="text-white/40 text-sm font-medium mb-6 uppercase tracking-widest">Kamera
                Hazırlanıyor...</div>
            <div id="manual-start-container"></div>
        </div>

        <!-- Settings Modal (API URL) -->
        <div id="settings-modal"
            class="absolute inset-0 bg-black/80 backdrop-blur-lg z-[100] hidden flex-col items-center justify-center p-8 text-center">
            <h2 class="text-xl font-bold mb-4">Sunucu Ayarları</h2>
            <p class="text-sm text-white/60 mb-6">Backend terminalindeki IP adresini buraya girin:</p>
            <input type="text" id="api-url-input"
                class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white mb-4"
                placeholder="http://192.168.1.XX:8000">
            <div class="flex gap-3 w-full">
                <button onclick="toggleSettings()"
                    class="flex-1 py-3 rounded-xl bg-white/10 font-bold uppercase tracking-wider text-xs">İptal</button>
                <button onclick="saveApiSettings()"
                    class="flex-1 py-3 rounded-xl bg-primary font-bold uppercase tracking-wider text-xs">Kaydet</button>
            </div>
        </div>

        <!-- Debug View (Warped Image) -->
        <canvas id="debug-canvas"
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80%] aspect-[800/1100] bg-black/80 border-2 border-primary z-30 hidden pointer-events-none"></canvas>

        <!-- Scanner Overlay -->
        <div class="scanner-overlay">
            <div class="scanner-frame">
                <div class="scan-line"></div>
                <div class="absolute -bottom-16 left-0 right-0 text-center">
                    <p class="text-xs font-medium text-white/80">Formu çerçeveye ortalayın</p>
                    <p class="text-[10px] text-white/40 mt-1 italic">Daha net odak için yaklaşın</p>
                </div>
            </div>
        </div>

        <!-- Bottom Controls -->
        <footer class="absolute bottom-0 w-full px-8 pb-12 flex items-center justify-between z-20">
            <button
                class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center text-white">
                <span class="material-symbols-outlined">image</span>
            </button>

            <button onclick="simulateCapture()" class="capture-btn group active:scale-95 transition-transform">
                <div class="capture-btn-inner group-hover:bg-gray-100 transition-colors"></div>
            </button>

            <div class="w-12 h-12 rounded-xl bg-primary/20 backdrop-blur-md border border-primary/30 flex items-center justify-center text-primary relative overflow-hidden group cursor-pointer"
                onclick="window.location.href='dashboard.html'">
                <span class="material-symbols-outlined z-10">check</span>
                <div
                    class="absolute inset-0 bg-primary/20 scale-0 group-hover:scale-100 transition-transform duration-500 rounded-full">
                </div>
            </div>
        </footer>

        <!-- Status Toast -->
        <div id="statusToast"
            class="absolute top-28 left-1/2 -translate-x-1/2 px-4 py-2.5 rounded-2xl bg-primary text-white text-[11px] font-bold shadow-glow flex items-center gap-2 z-30 opacity-0 transform translate-y-4 transition-all duration-300">
            <span class="material-symbols-outlined text-lg">check_circle</span>
            FORM TARANDI
        </div>
    </div>

    <script type="module">
        import { addStudentResult, getExams } from './firebase-config.js';
        import { OMREngine } from './omr-engine.js';

        const omr = new OMREngine();
        let isDebug = false;

        window.toggleSettings = function () {
            const modal = document.getElementById('settings-modal');
            const input = document.getElementById('api-url-input');
            if (modal.classList.contains('hidden')) {
                input.value = localStorage.getItem('omr_api_url') || 'http://localhost:8000';
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        window.saveApiSettings = function () {
            let url = document.getElementById('api-url-input').value.trim();
            if (!url.startsWith('http')) url = 'http://' + url;
            localStorage.setItem('omr_api_url', url);
            toggleSettings();
            alert("Sunucu adresi güncellendi: " + url);
        }

        window.toggleDebug = function () {
            isDebug = !isDebug;
            const debugCanvas = document.getElementById('debug-canvas');
            const debugBtn = document.getElementById('debugToggle');
            if (isDebug) {
                debugCanvas.classList.remove('hidden');
                debugBtn.classList.replace('bg-black/40', 'bg-primary');
            } else {
                debugCanvas.classList.add('hidden');
                debugBtn.classList.replace('bg-primary', 'bg-black/40');
            }
        }

        let scanning = true;
        let canvasElement;
        let canvasContext;
        let selectedExamId = null;
        let selectedExamData = null;

        window.simulateCapture = async function () {
            // Keep this button but alert that it's automatic now
            alert("Kamera otomatik tarama yapmaktadır. Lütfen formu okutun.");
        }

        async function processForm(qrData, imageData, qrResult = null) {
            console.log("processForm: Starting with QR data:", qrData);

            const toast = document.getElementById('statusToast');
            if (!toast) return;

            try {
                if (!selectedExamId || !scanning) {
                    console.log("processForm: Early return (No examId or already scanning)");
                    return;
                }
                scanning = false; // Pause scanning

                toast.classList.remove('opacity-0', 'translate-y-4');
                toast.classList.add('opacity-100', 'translate-y-0');
                toast.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">sync</span> FORM ANALİZ EDİLİYOR...';

                // 1. Try Python Backend first, fallback to client-side OMR
                console.log("processForm: Attempting Python Backend...");
                const base64Image = canvasElement.toDataURL('image/jpeg', 0.8);

                const apiUrl = (localStorage.getItem('omr_api_url') || 'http://192.168.1.231:8000').replace(/\/$/, "");
                console.log("processForm: API URL:", apiUrl);

                let realAnswers = null;
                let selectedBooklet = 'OKUNAMADI';
                let debugImageB64 = null;

                try {
                    // Backend attempt with 12-second timeout
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 12000);

                    const response = await fetch(`${apiUrl}/process-omr`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Image, examData: selectedExamData }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        const pythonResult = await response.json();
                        if (pythonResult.success) {
                            console.log("processForm: ✓ Python Backend succeeded");
                            realAnswers = pythonResult.answers;
                            selectedBooklet = pythonResult.booklet;
                            debugImageB64 = pythonResult.debug_image;
                        }
                    }
                } catch (backendErr) {
                    console.warn("processForm: Backend unavailable, using client-side OMR:", backendErr.message);
                }

                // 2. Fallback: Client-side JavaScript OMR
                if (!realAnswers) {
                    console.log("processForm: Using client-side OMR engine...");
                    toast.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">sync</span> YEREL OKUMA YAPILIYOR...';

                    if (!window.cv || !cv.Mat) {
                        throw new Error("OpenCV henüz yüklenmedi. Lütfen bekleyin.");
                    }

                    const cvResult = omr.processFrame(canvasElement, qrResult);
                    if (!cvResult) {
                        throw new Error("KAĞIT ALGILANAMADI. Lütfen formu düz tutun.");
                    }

                    const fixedGrid = _generateFixedGrid(selectedExamData);

                    realAnswers = omr.readMarks(cvResult.processedOMR, fixedGrid, qrResult);
                    console.log("processForm: Client-side answers:", realAnswers);

                    // Generate preview image from warped result WITH debug drawings
                    const previewCanvas = document.createElement('canvas');
                    previewCanvas.width = omr.targetWidth;
                    previewCanvas.height = omr.targetHeight;
                    cv.imshow(previewCanvas, cvResult.warpedImage);

                    // Add debug drawings to the preview image
                    omr.drawDebugGrid(previewCanvas, fixedGrid, realAnswers);

                    debugImageB64 = previewCanvas.toDataURL('image/jpeg', 0.8);

                    // Also update the persistent debug canvas if it's visible
                    if (isDebug) {
                        const debugCanvas = document.getElementById('debug-canvas');
                        debugCanvas.width = omr.targetWidth;
                        debugCanvas.height = omr.targetHeight;
                        const ctx = debugCanvas.getContext('2d');
                        ctx.drawImage(previewCanvas, 0, 0);
                    }

                    // Booklet
                    if (realAnswers['KITAPCIK']) {
                        const bMark = realAnswers['KITAPCIK'][0];
                        if (bMark !== " " && bMark !== "*") {
                            selectedBooklet = bMark;
                        } else if (bMark === "*") {
                            selectedBooklet = "HATALI (ÇİFT)";
                        }
                    }

                    cvResult.warpedImage.delete();
                    cvResult.processedOMR.delete();
                }

                // 3. Store preview image for success page
                if (debugImageB64) {
                    sessionStorage.setItem('lastScanPreview', debugImageB64);
                }

                // Store answers for success page
                sessionStorage.setItem('lastScanAnswers', JSON.stringify(realAnswers));

                // Save results
                const resultData = {
                    name: qrData.split('-')[0] || "QR İsim",
                    studentNo: qrData.split('-')[1] || "12345",
                    tcNo: qrData.split('-')[2] || "",
                    className: qrData.split('-')[3] || "",
                    score: "0",
                    booklet: selectedBooklet,
                    rawAnswers: JSON.stringify(realAnswers),
                    timestamp: new Date().toISOString()
                };

                console.log("processForm: Saving to Firestore...");
                // Add a timeout for the save operation
                const savePromise = addStudentResult(selectedExamId, resultData);
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error("Zaman aşımı (Firestore)")), 10000)
                );

                await Promise.race([savePromise, timeoutPromise]);
                console.log("processForm: Save successful!");

                toast.classList.replace('bg-primary', 'bg-green-500');
                toast.innerHTML = '<span class="material-symbols-outlined text-lg">check_circle</span> BAŞARILI';

                setTimeout(() => {
                    const params = new URLSearchParams({
                        examId: selectedExamId,
                        studentName: resultData.name,
                        studentNo: resultData.studentNo,
                        booklet: resultData.booklet,
                        tcNo: resultData.tcNo,
                        className: resultData.className
                    });
                    window.location.href = `scan-success.html?${params.toString()}`;
                }, 1000);

            } catch (error) {
                console.error("processForm: OMR Error:", error);
                toast.classList.replace('bg-primary', 'bg-red-500');
                toast.innerHTML = 'HATA: ' + error.message;
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-4');
                    toast.classList.replace('bg-red-500', 'bg-primary');
                    scanning = true;
                }, 1500); // Shorter retry time for paper not detected
            }
        }

        /**
         * Generates FIXED bubble coordinates for the warped 800x1100 image.
         */
        /**
         * Generates FIXED bubble coordinates for the warped 800x1100 image.
         * Recalibrated for the Primary & Middle School Answer Sheet (LGS).
         */
        function _generateFixedGrid(exam) {
            const grid = {};

            // 1. Booklet (KITAPCIK) - Grid spacing tightened & shifted up
            grid['KITAPCIK'] = [{
                options: [
                    { label: 'A', x: 535, y: 195 },
                    { label: 'B', x: 551.5, y: 195 },
                    { label: 'C', x: 568, y: 195 },
                    { label: 'D', x: 584.5, y: 195 }
                ]
            }];

            // 2. Subjects Grid
            // Sözel Bölüm & Sayısal Bölüm
            const startY = 310; // Shifted up from 325
            const rowHeight = 25.5; // Tightened from 26.0
            const optStep = 16.5; // Tightened from 17.5

            const columns = [
                // Verbal
                { name: 'Türkçe', x: 54, startY: startY, maxQ: 20 },
                { name: 'Sosyal Bilgiler', x: 159, startY: startY, maxQ: 10 },
                { name: 'Din Kültürü', x: 264, startY: startY, maxQ: 10 },
                { name: 'İngilizce', x: 369, startY: startY, maxQ: 10 },
                // Numerical
                { name: 'Matematik', x: 498, startY: startY, maxQ: 20 },
                { name: 'Fen Bilimleri', x: 602, startY: startY, maxQ: 20 }
            ];

            const aliases = {
                'Türkçe': ['türkçe', 'turkce', 'tr'],
                'Sosyal Bilgiler': ['sosyal', 'sosyal bilgiler', 'tarih', 'inkılap', 'inkilap'],
                'Din Kültürü': ['din', 'din kültürü', 'din kul', 'ahlak'],
                'İngilizce': ['ingilizce', 'ing', 'english', 'yabancı'],
                'Matematik': ['matematik', 'mat', 'math'],
                'Fen Bilimleri': ['fen', 'fen bilimleri', 'fen bil', 'science']
            };

            columns.forEach((col) => {
                const colAliases = aliases[col.name] || [col.name.toLowerCase()];
                // Find subject in exam data or use a default if it matches the column name
                const subject = exam?.subjects?.find(s => {
                    const sname = s.name.toLowerCase();
                    return colAliases.some(a => sname.includes(a.toLowerCase()) || a.toLowerCase().includes(sname));
                }) || { name: col.name, questionCount: col.maxQ };

                const questions = [];
                const qCount = subject.questionCount || col.maxQ;

                for (let i = 0; i < qCount; i++) {
                    const curY = col.startY + (i * rowHeight);
                    questions.push({
                        options: [
                            { label: 'A', x: col.x + optStep * 0, y: curY },
                            { label: 'B', x: col.x + optStep * 1, y: curY },
                            { label: 'C', x: col.x + optStep * 2, y: curY },
                            { label: 'D', x: col.x + optStep * 3, y: curY }
                        ]
                    });
                }
                grid[subject.name] = questions;
            });

            return grid;
        }


        window.onload = async () => {
            // 1. Start Camera Immediately
            initCamera();

            // 2. Prepare Canvas
            canvasElement = document.createElement("canvas");
            canvasContext = canvasElement.getContext("2d", { willReadFrequently: true });

            // 3. Get selected exam from URL params
            const urlParams = new URLSearchParams(window.location.search);
            selectedExamId = urlParams.get('examId');

            try {
                if (!selectedExamId) {
                    const exams = await getExams();
                    if (exams && exams.length > 0) {
                        selectedExamId = exams[0].id;
                        selectedExamData = exams[0];
                        document.getElementById('examTypeLabel').textContent = selectedExamData.name || "SINAV";
                    }
                } else {
                    const exams = await getExams();
                    selectedExamData = exams.find(e => e.id === selectedExamId);
                    if (selectedExamData) {
                        document.getElementById('examTypeLabel').textContent = selectedExamData.name || "SINAV";
                    }
                }
            } catch (e) {
                console.error("Exam load failed:", e);
                document.getElementById('examTypeLabel').textContent = "SINAV VERISI ALINAMADI";
            }
        };

        let frameCount = 0;
        function tick() {
            const videoEl = document.getElementById('camera-feed');
            if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA && videoEl.videoWidth > 0) {
                frameCount++;
                // Only process every 3rd frame for better performance
                if (frameCount % 3 !== 0) {
                    requestAnimationFrame(tick);
                    return;
                }

                // Resize detection canvas
                const targetW = 1280;
                const scale = targetW / videoEl.videoWidth;
                canvasElement.width = targetW;
                canvasElement.height = videoEl.videoHeight * scale;
                canvasContext.drawImage(videoEl, 0, 0, canvasElement.width, canvasElement.height);

                if (scanning) {
                    const imageData = canvasContext.getImageData(0, 0, canvasElement.width, canvasElement.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                    if (code) {
                        processForm(code.data, imageData, code);
                    }
                }
            }
            requestAnimationFrame(tick);
        }

        async function initCamera() {
            const videoEl = document.getElementById('camera-feed');
            const placeholder = document.getElementById('camera-placeholder');
            const statusText = document.getElementById('camera-status');
            const container = document.getElementById('manual-start-container');

            const updateStatus = (text) => {
                console.log("initCamera Status:", text);
                if (statusText) statusText.innerText = text;
            };

            const hidePlaceholder = () => {
                console.log("initCamera: Hiding placeholder");
                placeholder.classList.add('opacity-0');
                setTimeout(() => {
                    placeholder.classList.add('hidden');
                }, 500);
            };

            const showManualButton = () => {
                if (container) {
                    container.innerHTML = `
                        <button onclick="document.getElementById('camera-feed').play(); hidePlaceholder();" 
                                class="bg-primary hover:bg-primary/80 px-10 py-4 rounded-2xl text-white font-bold transition-all shadow-glow flex items-center gap-2">
                            <span class="material-symbols-outlined">play_arrow</span>
                            KAMERAYI BAŞLAT
                        </button>`;
                }
            };

            window.hidePlaceholder = hidePlaceholder; // Make it global for the button

            updateStatus("Kamera İzni Bekleniyor...");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                videoEl.srcObject = stream;
                updateStatus("Video Yükleniyor...");

                // Handle events for different browsers
                videoEl.onplaying = hidePlaceholder;
                videoEl.onloadedmetadata = () => {
                    updateStatus("Başlatılıyor...");
                    videoEl.play().catch(e => {
                        console.warn("Autoplay blocked:", e);
                        updateStatus("Dokunuş Gerekiyor");
                        showManualButton();
                    });
                };

                // Fail-safe for hiding placeholder
                setTimeout(() => {
                    if (videoEl.currentTime > 0) hidePlaceholder();
                    else if (videoEl.srcObject) showManualButton();
                    else if (!videoEl.srcObject) updateStatus("İzin Bekleniyor...");
                }, 4000);

            } catch (err) {
                console.error("Camera error:", err);
                const icon = document.getElementById('placeholder-icon');
                if (icon) {
                    icon.innerText = "no_photography";
                    icon.classList.replace('text-white/20', 'text-red-500/50');
                }
                updateStatus("Kamera Açılamadı");
                if (container) {
                    container.innerHTML = `
                        <div class="text-white/60 text-xs mb-4">Tarayıcı ayarlarından kamera iznini kontrol edin.</div>
                        <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 px-8 py-3 rounded-2xl text-white font-bold transition-all">
                            TEKRAR DENE
                        </button>`;
                }
            }

            if (!window.scanningInitialized) {
                window.scanningInitialized = true;
                requestAnimationFrame(tick);
            }
        }
    </script>
</body>

</html>
