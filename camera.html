<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Optik Tarama</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <meta name="color-scheme" content="light">
    <script src="theme-manager.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <script src="https://docs.opencv.org/4.5.2/opencv.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#7C3AED",
                        secondary: "#F3F4F6",
                        surface: "#FFFFFF",
                        "text-main": "#111827",
                        "text-muted": "#6B7280",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .scanner-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0;
        }

        .scanner-frame::before {
            content: '';
            position: absolute;
            top: 12%;
            left: 4%;
            right: 4%;
            bottom: 15%;
            border: 4px solid #7C3AED;
            border-radius: 20px;
            opacity: 0.6;
            clip-path: polygon(0 0, 25% 0, 25% 4px, 4px 4px, 4px 25%, 0 25%, 0 0, 75% 0, 100% 0, 100% 25%, calc(100% - 4px) 25%, calc(100% - 4px) 4px, 75% 4px, 75% 0, 100% 75%, 100% 100%, 75% 100%, 75% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 75%, 100% 75%, 25% 100%, 0 100%, 0 75%, 4px 75%, 4px calc(100% - 4px), 25% calc(100% - 4px), 25% 100%);
        }

        .scan-line {
            position: absolute;
            top: 12%;
            left: 4%;
            right: 4%;
            height: 4px;
            background: linear-gradient(180deg, transparent, rgba(124, 58, 237, 0.8), transparent);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
            animation: scan 3s ease-in-out infinite;
            z-index: 15;
        }

        @keyframes scan {
            0% {
                top: 13%;
            }

            50% {
                top: 84%;
            }

            100% {
                top: 13%;
            }
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #111;
        }

        .capture-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: #fff;
            padding: 4px;
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .capture-btn-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #fff;
            border: 2px solid #000;
        }
    </style>
</head>

<body class="font-sans">
    <div class="max-w-md mx-auto h-full relative flex flex-col overflow-hidden">
        <!-- Top Controls -->
        <header class="absolute top-0 w-full px-6 pt-12 flex justify-between items-center z-20">
            <button onclick="window.location.href='scan-select.html'"
                class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div class="px-4 py-2 rounded-full bg-black/40 backdrop-blur-md text-[10px] font-bold tracking-[0.1em] text-white uppercase border border-white/10"
                id="examTypeLabel">
                LGS DENEME
            </div>
            <button
                class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white">
                <span class="material-symbols-outlined">flash_on</span>
            </button>
        </header>

        <!-- Camera Feed -->
        <video id="camera-feed" autoplay playsinline muted
            class="absolute inset-0 w-full h-full object-cover z-0"></video>
        <div id="camera-placeholder"
            class="absolute inset-0 flex items-center justify-center bg-[#111] z-0 transition-opacity duration-500">
            <span class="material-symbols-outlined text-white/20 text-[120px]">photo_camera</span>
        </div>

        <!-- Scanner Overlay -->
        <div class="scanner-overlay">
            <div class="scanner-frame">
                <div class="scan-line"></div>
                <div class="absolute -bottom-16 left-0 right-0 text-center">
                    <p class="text-xs font-medium text-white/80">Formu çerçeveye ortalayın</p>
                    <p class="text-[10px] text-white/40 mt-1 italic">Daha net odak için yaklaşın</p>
                </div>
            </div>
        </div>

        <!-- Bottom Controls -->
        <footer class="absolute bottom-0 w-full px-8 pb-12 flex items-center justify-between z-20">
            <button
                class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center text-white">
                <span class="material-symbols-outlined">image</span>
            </button>

            <button onclick="simulateCapture()" class="capture-btn group active:scale-95 transition-transform">
                <div class="capture-btn-inner group-hover:bg-gray-100 transition-colors"></div>
            </button>

            <div class="w-12 h-12 rounded-xl bg-primary/20 backdrop-blur-md border border-primary/30 flex items-center justify-center text-primary relative overflow-hidden group cursor-pointer"
                onclick="window.location.href='dashboard.html'">
                <span class="material-symbols-outlined z-10">check</span>
                <div
                    class="absolute inset-0 bg-primary/20 scale-0 group-hover:scale-100 transition-transform duration-500 rounded-full">
                </div>
            </div>
        </footer>

        <!-- Status Toast -->
        <div id="statusToast"
            class="absolute top-28 left-1/2 -translate-x-1/2 px-4 py-2.5 rounded-2xl bg-primary text-white text-[11px] font-bold shadow-glow flex items-center gap-2 z-30 opacity-0 transform translate-y-4 transition-all duration-300">
            <span class="material-symbols-outlined text-lg">check_circle</span>
            FORM TARANDI
        </div>
    </div>

    <script type="module">
        import { addStudentResult, getExams } from './firebase-config.js';
        import { OMREngine } from './omr-engine.js';

        const omr = new OMREngine();
        let selectedExamId = null;
        let selectedExamData = null;

        let scanning = true;
        let canvasElement;
        let canvasContext;

        window.simulateCapture = async function () {
            // Keep this button but alert that it's automatic now
            alert("Kamera otomatik tarama yapmaktadır. Lütfen formu okutun.");
        }

        async function processForm(qrData, imageData) {
            if (!selectedExamId || !scanning) return;
            scanning = false; // Pause scanning

            const toast = document.getElementById('statusToast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            toast.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">sync</span> FORM ANALİZ EDİLİYOR...';

            try {
                // 1. Process with OpenCV
                const cvResult = omr.processFrame(canvasElement);
                if (!cvResult) {
                    toast.innerHTML = '<span class="material-symbols-outlined text-lg">error</span> KAĞIT ALGILANAMADI';
                    setTimeout(() => {
                        toast.classList.add('opacity-0', 'translate-y-4');
                        scanning = true;
                    }, 1000);
                    return;
                }

                // 2. Generate Fixed Grid (for 800x1100 warped image)
                const fixedGrid = _generateFixedGrid(selectedExamData);

                // 3. Read Marks
                const realAnswers = omr.readMarks(cvResult.processedOMR, fixedGrid);

                // Booklet & Score
                const bookletResult = realAnswers['KITAPCIK'] ? realAnswers['KITAPCIK'][0] : 'A';
                const selectedBooklet = bookletResult.trim() === '' ? 'A' : bookletResult;

                // Cleanup
                cvResult.warpedImage.delete();
                cvResult.processedOMR.delete();

                // Save results
                const resultData = {
                    name: qrData.split('-')[0] || "QR İsim",
                    studentNo: qrData.split('-')[1] || "12345",
                    tcNo: qrData.split('-')[2] || "",
                    className: qrData.split('-')[3] || "",
                    score: "0",
                    booklet: selectedBooklet,
                    rawAnswers: JSON.stringify(realAnswers),
                };

                await addStudentResult(selectedExamId, resultData);

                toast.classList.replace('bg-primary', 'bg-green-500');
                toast.innerHTML = '<span class="material-symbols-outlined text-lg">check_circle</span> BAŞARILI';

                setTimeout(() => {
                    const params = new URLSearchParams({
                        examId: selectedExamId,
                        studentName: resultData.name,
                        studentNo: resultData.studentNo,
                        booklet: resultData.booklet
                    });
                    window.location.href = `scan-success.html?${params.toString()}`;
                }, 1000);

            } catch (error) {
                console.error("OMR Error:", error);
                toast.classList.add('bg-red-500');
                toast.innerHTML = 'HATA: ' + error.message;
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-4');
                    scanning = true;
                }, 2000);
            }
        }

        /**
         * Generates FIXED bubble coordinates for the warped 800x1100 image.
         */
        function _generateFixedGrid(exam) {
            const grid = {};

            // 1. Booklet (KITAPCIK) - Fixed coordinates on 800x1100
            grid['KITAPCIK'] = [{
                options: [
                    { label: 'A', x: 350, y: 154 },
                    { label: 'B', x: 390, y: 154 },
                    { label: 'C', x: 430, y: 154 },
                    { label: 'D', x: 470, y: 154 }
                ]
            }];

            if (!exam || !exam.subjects) return grid;

            // 2. Subjects Grid - Calibration based on LGS form layout
            const startX = 64;
            const startY = 328;
            const colWidth = 118;
            const rowHeight = 36;

            const subjectNames = ['Türkçe', 'İnkılap', 'Din', 'İngilizce', 'Matematik', 'Fen'];

            subjectNames.forEach((name, sIdx) => {
                const subject = exam.subjects.find(s => s.name.toLowerCase().includes(name.toLowerCase()));
                if (subject) {
                    const questions = [];
                    const qCount = subject.questionCount || 20;
                    const curX = startX + (sIdx * colWidth);

                    for (let i = 0; i < qCount; i++) {
                        const curY = startY + (i * rowHeight);
                        const optStep = 21;
                        questions.push({
                            options: [
                                { label: 'A', x: curX + optStep * 0, y: curY },
                                { label: 'B', x: curX + optStep * 1, y: curY },
                                { label: 'C', x: curX + optStep * 2, y: curY },
                                { label: 'D', x: curX + optStep * 3, y: curY },
                                { label: 'E', x: curX + optStep * 4, y: curY }
                            ]
                        });
                    }
                    grid[subject.name] = questions;
                }
            });

            return grid;
        }


        window.onload = async () => {
            // Get selected exam from URL params
            const urlParams = new URLSearchParams(window.location.search);
            selectedExamId = urlParams.get('examId');

            if (!selectedExamId) {
                // Determine the most recent exam if none selected (for testing)
                const exams = await getExams();
                if (exams && exams.length > 0) {
                    selectedExamId = exams[0].id;
                    document.getElementById('examTypeLabel').textContent = exams[0].name || "SINAV";
                } else {
                    document.getElementById('examTypeLabel').textContent = "SINAV SEÇİLMEDİ";
                }
            } else {
                document.getElementById('examTypeLabel').textContent = "Taranıyor...";
                // Ideally fetch exam name by ID and display it here
                const exams = await getExams();
                selectedExamData = exams.find(e => e.id === selectedExamId);
                if (selectedExamData) {
                    document.getElementById('examTypeLabel').textContent = selectedExamData.name || "SINAV";
                }
            }

            // Create hidden canvas for jsQR
            canvasElement = document.createElement("canvas");
            canvasContext = canvasElement.getContext("2d", { willReadFrequently: true });

            // Initialize Camera
            await initCamera();
        };

        function tick() {
            const videoEl = document.getElementById('camera-feed');
            if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA && scanning) {
                canvasElement.height = videoEl.videoHeight;
                canvasElement.width = videoEl.videoWidth;
                canvasContext.drawImage(videoEl, 0, 0, canvasElement.width, canvasElement.height);
                const imageData = canvasContext.getImageData(0, 0, canvasElement.width, canvasElement.height);

                // jsQR scanning
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    console.log("Found QR code", code.data);
                    processForm(code.data, imageData);
                } else {
                    requestAnimationFrame(tick);
                }
            } else {
                requestAnimationFrame(tick);
            }
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                const videoEl = document.getElementById('camera-feed');
                videoEl.srcObject = stream;

                // Hide placeholder once video playing
                videoEl.onplaying = () => {
                    document.getElementById('camera-placeholder').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('camera-placeholder').style.display = 'none';
                        requestAnimationFrame(tick); // start scanning loop
                    }, 500);
                };
            } catch (err) {
                console.error("Camera access error:", err);
                const placeholder = document.getElementById('camera-placeholder');
                placeholder.innerHTML = `<div class="text-center text-red-400 p-4"><span class="material-symbols-outlined text-[64px] mb-2">no_photography</span><br/>Kamera erişimi reddedildi veya bulunamadı. Lütfen izin verin.</div>`;
            }
        }
    </script>
</body>

</html>
